<div class="container">
    <h2>Crear cuenta nueva</h2>

    <form (ngSubmit)="registro()" #registroForm="ngForm">
        <div class="form-grid">
            <div class="field-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Ana" required [(ngModel)]="nombre">
            </div>

            <div class="field-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ej. García" required [(ngModel)]="apellido">
            </div>

            <div class="field-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" name="telefono" placeholder="Ej. 987654321" required [(ngModel)]="telefono">
            </div>

            <div class="field-group">
                <label for="rol">Nivel de Interés</label>
                <select id="interesId" name="interesId" [(ngModel)]="interesId" required>
                    <option value="estudiante">--Seleccione el ínteres</option>
                    <option *ngFor="let int of niveles" [ngValue]="int.id">{{int.nombre}}</option>
                </select>
            </div>

            <div class="field-group full-width">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ana@ejemplo.com" required [(ngModel)]="username">
            </div>

            <div class="field-group full-width">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required [(ngModel)]="password">
            </div>
        </div>

        <button type="submit" class="btn-submit full-width" style="width: 100%;">Crear cuenta</button>
    </form>
</div>
