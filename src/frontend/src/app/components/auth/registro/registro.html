<div class="container">
    <h2>Crear cuenta nueva</h2>

    <form action="/registro" method="POST">
        <div class="form-grid">
            <div class="field-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Ana" required>
            </div>

            <div class="field-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ej. García" required>
            </div>

            <div class="field-group full-width">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ana@ejemplo.com" required>
            </div>

            <div class="field-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="ana_garcia" required>
            </div>

            <div class="field-group">
                <label for="rol">Nivel de Interés</label>
                <select id="rol" name="rol">
                    <option value="estudiante">Estudiante de Secundaria</option>
                    <option value="universitario">Universitario</option>
                    <option value="profesional">Cambio de Carrera</option>
                </select>
            </div>

            <div class="field-group full-width">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <div class="full-width">
                <hr>
            </div>

            <div class="field-group full-width">
                <label for="confirm_password">Confirmar Contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="********" required>
            </div>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="text-transform: none; font-weight: 400; margin-bottom: 0;">
                Acepto los términos y condiciones de uso para el test vocacional
            </label>
        </div>

        <button type="submit" class="btn-submit full-width" style="width: 100%;">Crear cuenta</button>
    </form>
</div>
